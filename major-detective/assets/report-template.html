<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大学专业侦探报告</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17202a;
      background: #f7f8fa;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px;
      background: #ffffff;
      min-height: 100vh;
    }
    h1, h2 {
      margin: 0 0 14px;
      line-height: 1.25;
    }
    h1 {
      font-size: 32px;
    }
    h2 {
      margin-top: 28px;
      font-size: 21px;
      border-bottom: 1px solid #e6e8eb;
      padding-bottom: 8px;
    }
    p, li {
      font-size: 16px;
      line-height: 1.75;
    }
    .meta {
      color: #5d6673;
      margin-bottom: 28px;
    }
    .radar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .item {
      border: 1px solid #e6e8eb;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
    }
  </style>
</head>
<body>
  <main>
    <h1>{{major}} 专业真相报告</h1>
    <p class="meta">由「大学专业侦探」根据用户画像和公开信息调查框架生成。请结合官方招生信息核验。</p>
    {{content}}
  </main>
</body>
</html>
